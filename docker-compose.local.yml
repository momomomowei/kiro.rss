services:
  kiro-rss:
    build:
      context: .
      dockerfile: Dockerfile
    image: kiro-rss:local
    container_name: kiro-rss
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:9990:8990"
    volumes:
      - ./config/:/app/config/
    restart: unless-stopped
